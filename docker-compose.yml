services:
  neo4j:
    image: neo4j:5-community
    container_name: student-modeling-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - student-modeling

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-modeling-app
    entrypoint: ["bash", "scripts/entrypoint.sh"]
    command: ["bash"]
    stdin_open: true
    tty: true
    working_dir: /app
    volumes:
      - .:/app
      - venv_data:/app/.venv
      - hf_cache:/root/.cache/huggingface
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
      NEO4J_DATABASE: neo4j
      LOG_LEVEL: INFO
      HF_HOME: /root/.cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - student-modeling

volumes:
  neo4j_data:
  neo4j_logs:
  venv_data:
  hf_cache:

networks:
  student-modeling:
    driver: bridge
